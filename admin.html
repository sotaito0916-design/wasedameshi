<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理者画面 — ワセメシ</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">
  function openRejectModal(id) {
    document.getElementById('reject-shop-id').value = id;
    document.getElementById('reject-reason').value = '';
    document.getElementById('reject-modal-bg').classList.add('open');
  }
  function closeRejectModal() {
    document.getElementById('reject-modal-bg').classList.remove('open');
  }
  async function confirmReject() {
    const id = document.getElementById('reject-shop-id').value;
    const reason = document.getElementById('reject-reason').value.trim();
    const { error } = await client.from('shops').update({ status: 'rejected', rejection_reason: reason || null }).eq('id', id);
    if (error) { alert('更新に失敗しました'); return; }
    const shop = allShops.find(s => s.id === id);
    if (shop) { shop.status = 'rejected'; shop.rejection_reason = reason; }
    closeRejectModal();
    updateStats();
    renderList();
  }
</script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif; background: #f8f7f4; color: #1a1a1a; min-height: 100vh; }
    .login-wrap { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 1rem; }
    .login-card { background: #fff; border: 1px solid #e8e6e0; border-radius: 16px; padding: 2rem; width: 100%; max-width: 360px; }
    .login-card h1 { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
    .login-card p { font-size: 13px; color: #888; margin-bottom: 1.5rem; }
    .login-card label { font-size: 12px; font-weight: 600; color: #555; display: block; margin-bottom: 6px; text-transform: uppercase; letter-spacing: .05em; }
    .login-card input { width: 100%; padding: 10px 12px; font-size: 14px; border: 1px solid #ddd; border-radius: 10px; margin-bottom: 12px; font-family: inherit; }
    .login-card input:focus { outline: none; border-color: #1a1a1a; }
    .login-btn { width: 100%; padding: 11px; font-size: 14px; font-weight: 700; background: #1a1a1a; color: #fff; border: none; border-radius: 10px; cursor: pointer; }
    .login-error { font-size: 13px; color: #c0392b; margin-top: 8px; display: none; }
    .admin-ui { display: none; }
    header { background: #fff; border-bottom: 1px solid #e8e6e0; padding: 0 1.5rem; display: flex; align-items: center; justify-content: space-between; height: 56px; }
    .logo { font-size: 16px; font-weight: 700; color: #1a1a1a; display: flex; align-items: center; gap: 8px; }
    .admin-badge { font-size: 11px; padding: 2px 8px; background: #1a1a1a; color: #fff; border-radius: 999px; }
    .logout-btn { font-size: 13px; color: #888; background: none; border: none; cursor: pointer; }
    main { max-width: 800px; margin: 0 auto; padding: 1.5rem 1rem 4rem; }
    .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 1.5rem; }
    .stat { background: #fff; border: 1px solid #e8e6e0; border-radius: 12px; padding: 1rem; text-align: center; }
    .stat-num { font-size: 28px; font-weight: 700; }
    .stat-num.pending { color: #e85d24; }
    .stat-num.approved { color: #1a7a4a; }
    .stat-num.rejected { color: #888; }
    .stat-label { font-size: 12px; color: #888; margin-top: 2px; }
    .tab-row { display: flex; gap: 6px; margin-bottom: 1rem; }
    .tab { font-size: 13px; padding: 6px 16px; border-radius: 999px; border: 1px solid #ddd; background: transparent; cursor: pointer; color: #666; transition: all .15s; }
    .tab.active { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
    .shop-card { background: #fff; border: 1px solid #e8e6e0; border-radius: 14px; margin-bottom: 10px; overflow: hidden; }
    .shop-card-img { width: 100%; height: 140px; object-fit: cover; display: block; background: #f8f7f4; }
    .shop-card-img-placeholder { width: 100%; height: 140px; display: flex; align-items: center; justify-content: center; font-size: 40px; background: #f8f7f4; }
    .shop-card-body { padding: 1rem 1.25rem; }
    .shop-card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; margin-bottom: 8px; }
    .shop-name { font-size: 16px; font-weight: 600; }
    .shop-meta { font-size: 12px; color: #888; margin-top: 2px; }
    .badge { font-size: 11px; padding: 3px 10px; border-radius: 999px; font-weight: 600; white-space: nowrap; }
    .badge-pending { background: #fff3e8; color: #a84f00; border: 1px solid #f5d5b0; }
    .badge-approved { background: #e4f5ee; color: #1a6e4a; border: 1px solid #b0ddc5; }
    .badge-rejected { background: #fdecea; color: #a0342e; border: 1px solid #f5c6c2; }
    .tags { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 8px; }
    .tag { font-size: 11px; padding: 2px 9px; border-radius: 999px; font-weight: 500; }
    .tag-genre { background: #f0eef9; color: #4a3fa8; }
    .tag-vibe { background: #e4f5ee; color: #1a6e4a; }
    .shop-desc { font-size: 13px; color: #666; line-height: 1.55; margin-bottom: 8px; }
    .shop-map { font-size: 12px; color: #4a3fa8; text-decoration: none; display: inline-block; margin-bottom: 8px; }
    .shop-date { font-size: 11px; color: #aaa; margin-bottom: 10px; }
    .actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .btn { font-size: 13px; padding: 7px 16px; border-radius: 8px; cursor: pointer; font-weight: 600; transition: opacity .15s; border: 1px solid; }
    .btn:hover { opacity: .75; }
    .btn-approve { border-color: #b0ddc5; background: #e4f5ee; color: #1a6e4a; }
    .btn-reject { border-color: #f5c6c2; background: #fdecea; color: #a0342e; }
    .btn-edit { border-color: #d4d0f0; background: #f0eef9; color: #4a3fa8; }
    .btn-restore { border-color: #ddd; background: #f8f7f4; color: #666; }
    .empty { text-align: center; padding: 3rem; color: #888; font-size: 14px; }
    .loading { text-align: center; padding: 2rem; color: #888; font-size: 14px; }
    .refresh-btn { font-size: 12px; color: #888; background: none; border: 1px solid #ddd; padding: 5px 12px; border-radius: 8px; cursor: pointer; margin-left: auto; display: block; margin-bottom: 1rem; }

    /* 編集モーダル */
    .modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 100; align-items: flex-start; justify-content: center; padding: 1rem; overflow-y: auto; }
    .modal-bg.open { display: flex; }
    .modal { background: #fff; border-radius: 16px; padding: 1.5rem; width: 100%; max-width: 540px; margin: auto; }
    .modal h2 { font-size: 18px; font-weight: 700; margin-bottom: 1.5rem; }
    .form-group { margin-bottom: 14px; }
    .form-group label { font-size: 12px; font-weight: 600; color: #555; display: block; margin-bottom: 5px; text-transform: uppercase; letter-spacing: .05em; }
    .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 9px 12px; font-size: 14px; border: 1px solid #ddd; border-radius: 10px; font-family: inherit; }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: #1a1a1a; }
    .form-group textarea { height: 80px; resize: vertical; }
    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .vibe-options { display: flex; flex-wrap: wrap; gap: 6px; }
    .vibe-label { display: flex; align-items: center; gap: 5px; font-size: 12px; cursor: pointer; padding: 5px 10px; border: 1px solid #ddd; border-radius: 999px; transition: all .15s; user-select: none; }
    .vibe-label:has(input:checked) { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
    .vibe-label input { position: absolute; opacity: 0; pointer-events: none; }

    /* 画像アップロード（モーダル内） */
    .img-current { width: 100%; height: 140px; object-fit: cover; border-radius: 10px; margin-bottom: 8px; display: block; }
    .img-current-placeholder { width: 100%; height: 140px; display: flex; align-items: center; justify-content: center; font-size: 40px; background: #f8f7f4; border-radius: 10px; margin-bottom: 8px; }
    .img-upload-small { border: 1px dashed #ddd; border-radius: 10px; padding: 10px; text-align: center; cursor: pointer; position: relative; font-size: 13px; color: #888; }
    .img-upload-small input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
    .img-new-preview { width: 100%; height: 120px; object-fit: cover; border-radius: 8px; margin-top: 8px; display: none; }

    .modal-actions { display: flex; gap: 8px; margin-top: 1rem; }
    .save-btn { flex: 1; padding: 11px; font-size: 14px; font-weight: 700; background: #1a1a1a; color: #fff; border: none; border-radius: 10px; cursor: pointer; }
    .save-btn:disabled { opacity: .5; cursor: not-allowed; }
    .cancel-btn { padding: 11px 20px; font-size: 14px; color: #888; background: #f0ede8; border: none; border-radius: 10px; cursor: pointer; }
    .save-msg { font-size: 13px; margin-top: 8px; padding: 8px 12px; border-radius: 8px; display: none; text-align: center; }
    .user-card { background: #fff; border: 1px solid #e8e6e0; border-radius: 14px; padding: 1rem 1.25rem; margin-bottom: 10px; }
    .user-card-top { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
    .user-avatar { width: 36px; height: 36px; border-radius: 50%; background: #f0eef9; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; color: #4a3fa8; flex-shrink: 0; }
    .user-info-block { flex: 1; }
    .user-username { font-size: 15px; font-weight: 600; }
    .user-meta { font-size: 12px; color: #888; }
    .username-edit-row { display: flex; gap: 8px; align-items: center; }
    .username-edit-row input { flex: 1; padding: 7px 10px; font-size: 13px; border: 1px solid #ddd; border-radius: 8px; font-family: inherit; }
    .username-edit-row input:focus { outline: none; border-color: #1a1a1a; }
    .username-edit-row button { font-size: 12px; padding: 7px 14px; border-radius: 8px; border: 1px solid #d4d0f0; background: #f0eef9; color: #4a3fa8; cursor: pointer; white-space: nowrap; }
    .save-msg.success { background: #e4f5ee; color: #1a6e4a; display: block; }
    .save-msg.error { background: #fdecea; color: #a0342e; display: block; }
  </style>
</head>
<body>
<div class="login-wrap" id="login-wrap">
  <div class="login-card">
    <h1>🔐 管理者ログイン</h1>
    <p>ワセメシ管理者専用ページです</p>
    <label>パスワード</label>
    <input type="password" id="pw-input" placeholder="パスワードを入力" onkeydown="if(event.key==='Enter')login()">
    <button class="login-btn" onclick="login()">ログイン</button>
    <div class="login-error" id="login-error">パスワードが違います</div>
  </div>
</div>

<div class="admin-ui" id="admin-ui">
  <header>
    <div class="logo">ワセメシ管理 <span class="admin-badge">Admin</span></div>
    <button class="logout-btn" onclick="logout()">ログアウト</button>
  </header>
  <main>
    <div class="stats">
      <div class="stat"><div class="stat-num pending" id="s-pending">-</div><div class="stat-label">審査待ち</div></div>
      <div class="stat"><div class="stat-num approved" id="s-approved">-</div><div class="stat-label">承認済み</div></div>
      <div class="stat"><div class="stat-num rejected" id="s-rejected">-</div><div class="stat-label">却下</div></div>
    </div>
    <div class="tab-row">
      <button class="tab active" onclick="switchTab('pending')">審査待ち</button>
      <button class="tab" onclick="switchTab('approved')">承認済み</button>
      <button class="tab" onclick="switchTab('rejected')">却下</button>
      <button class="tab" onclick="switchTab('users')">ユーザー管理</button>
    </div>
    <button class="refresh-btn" onclick="currentTab==='users' ? loadUsers() : loadShops()">↻ 再読み込み</button>
    <div id="shop-list"><div class="loading">読み込み中...</div></div>
  </main>
</div>

<!-- 編集モーダル -->
<div class="modal-bg" id="modal-bg" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <h2>お店情報を編集</h2>
    <input type="hidden" id="edit-id">
    <input type="hidden" id="edit-current-image">

    <div class="form-group">
      <label>現在の画像</label>
      <div id="edit-img-current"></div>
      <button type="button" onclick="clearImage()" style="font-size:12px;color:#a0342e;background:#fdecea;border:1px solid #f5c6c2;padding:5px 12px;border-radius:8px;cursor:pointer;margin-bottom:8px;">🗑 画像をデフォルトに戻す（著作権対応）</button>
      <div class="img-upload-small">
        <input type="file" id="edit-image" accept="image/*" onchange="previewEditImage(this)">
        📷 画像を変更する（クリックまたはドラッグ）
        <img id="edit-img-new-preview" class="img-new-preview" alt="新しい画像プレビュー">
      </div>
    </div>

    <div class="form-group">
      <label>店名</label>
      <input type="text" id="edit-name">
    </div>
    <div class="row2">
      <div class="form-group">
        <label>ジャンル</label>
        <select id="edit-genre">
          <option>ラーメン</option><option>定食・ごはん</option><option>カフェ</option>
          <option>居酒屋・バー</option><option>カレー</option><option>寿司・和食</option>
        </select>
      </div>
      <div class="form-group">
        <label>エリア</label>
        <select id="edit-area">
          <option>早稲田キャンパス周辺</option><option>高田馬場駅周辺</option><option>戸山公園周辺</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label>予算（円）</label>
      <input type="number" id="edit-price" min="100">
    </div>
    <div class="form-group">
      <label>雰囲気</label>
      <div class="vibe-options">
        <label class="vibe-label"><input type="checkbox" value="一人OK"> 一人でも入りやすい</label>
        <label class="vibe-label"><input type="checkbox" value="グループ"> グループ向け</label>
        <label class="vibe-label"><input type="checkbox" value="デート"> デートにおすすめ</label>
        <label class="vibe-label"><input type="checkbox" value="勉強"> 勉強・作業できる</label>
        <label class="vibe-label"><input type="checkbox" value="深夜"> 深夜営業あり</label>
      </div>
    </div>
    <div class="form-group">
      <label>コメント</label>
      <textarea id="edit-desc"></textarea>
    </div>
    <div class="form-group">
      <label>メニュー表の画像</label>
      <div id="edit-menu-current"></div>
      <div class="img-upload-small" style="margin-top:8px;">
        <input type="file" id="edit-menu-image" accept="image/*" onchange="previewEditMenu(this)">
        📋 メニュー表を変更する（クリックまたはドラッグ）
        <img id="edit-menu-preview" class="img-new-preview" alt="メニュープレビュー">
      </div>
      <button type="button" onclick="clearMenuImage()" style="margin-top:8px;font-size:12px;padding:5px 12px;border-radius:8px;border:1px solid #f5c6c2;background:#fdecea;color:#a0342e;cursor:pointer;">🗑️ メニュー画像を削除</button>
    </div>

    <div class="form-group">
      <label>営業時間</label>
      <div style="display:flex;align-items:center;gap:10px;">
        <input type="time" id="edit-open" style="flex:1;padding:8px 10px;font-size:13px;border:1px solid #ddd;border-radius:8px;">
        <span style="font-size:13px;color:#888;">〜</span>
        <input type="time" id="edit-close" style="flex:1;padding:8px 10px;font-size:13px;border:1px solid #ddd;border-radius:8px;">
      </div>
    </div>

    <div class="form-group">
      <label>GoogleマップURL</label>
      <input type="url" id="edit-map">
    </div>
    <div class="save-msg" id="save-msg"></div>
    <div class="modal-actions">
      <button class="cancel-btn" onclick="closeModal()">キャンセル</button>
      <button class="save-btn" id="save-btn" onclick="saveEdit()">保存する</button>
    </div>
  </div>
</div>

<script>
  const SUPABASE_URL = 'https://wkiwwtkutsesbcmofqak.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndraXd3dGt1dHNlc2JjbW9mcWFrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4OTU1NTgsImV4cCI6MjA5MTQ3MTU1OH0.eHfa9Ul9WV_Zi3YOrEHncr2Yy_MybQF40e6Bj9l1oJQ';
  const ADMIN_PASSWORD = '0916xh789Q';
  const GENRE_EMOJI = {'ラーメン':'🍜','定食・ごはん':'🍱','カフェ':'☕','居酒屋・バー':'🍻','カレー':'🍛','寿司・和食':'🍣'};

  const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  let allShops = [], currentTab = 'pending';

  function login() {
    const pw = document.getElementById('pw-input').value;
    if (pw === ADMIN_PASSWORD) { sessionStorage.setItem('waseda_admin', '1'); showAdmin(); }
    else { document.getElementById('login-error').style.display = 'block'; document.getElementById('pw-input').value = ''; }
  }
  function logout() { sessionStorage.removeItem('waseda_admin'); document.getElementById('admin-ui').style.display = 'none'; document.getElementById('login-wrap').style.display = 'flex'; document.getElementById('pw-input').value = ''; }
  function showAdmin() { document.getElementById('login-wrap').style.display = 'none'; document.getElementById('admin-ui').style.display = 'block'; loadShops(); }
  if (sessionStorage.getItem('waseda_admin') === '1') showAdmin();

  async function loadShops() {
    document.getElementById('shop-list').innerHTML = '<div class="loading">読み込み中...</div>';
    const { data, error } = await client.from('shops').select('*').order('submitted_at', { ascending: false });
    if (error) { document.getElementById('shop-list').innerHTML = '<div class="empty">読み込みに失敗しました</div>'; return; }
    allShops = data || []; updateStats(); renderList();
  }

  function updateStats() {
    document.getElementById('s-pending').textContent = allShops.filter(s => s.status === 'pending').length;
    document.getElementById('s-approved').textContent = allShops.filter(s => s.status === 'approved').length;
    document.getElementById('s-rejected').textContent = allShops.filter(s => s.status === 'rejected').length;
  }

  function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.tab').forEach((b, i) => b.classList.toggle('active', ['pending','approved','rejected','users'][i] === tab));
    if (tab === 'users') loadUsers();
    else renderList();
  }

  async function loadUsers() {
    document.getElementById('shop-list').innerHTML = '<div class="loading">読み込み中...</div>';
    const { data, error } = await client.from('profiles_with_count').select('*').order('approved_count', { ascending: false });
    if (error || !data) { document.getElementById('shop-list').innerHTML = '<div class="empty">読み込みに失敗しました</div>'; return; }
    if (!data.length) { document.getElementById('shop-list').innerHTML = '<div class="empty">ユーザーがいません</div>'; return; }
    document.getElementById('shop-list').innerHTML = data.map(u => `
      <div class="shop-card" style="padding:1rem 1.25rem;">
        <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;">
          <div>
            <div style="font-size:15px;font-weight:600;" id="uname-${u.id}">${u.username}</div>
            <div style="font-size:12px;color:#888;margin-top:2px;">承認数：${u.approved_count}件</div>
          </div>
          <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
            <input type="text" id="new-uname-${u.id}" placeholder="新しいユーザー名" style="padding:6px 10px;font-size:13px;border:1px solid #ddd;border-radius:8px;font-family:inherit;">
            <button class="btn btn-edit" onclick="adminChangeUsername('${u.id}')">変更</button>
          </div>
        </div>
        <div style="font-size:11px;color:#aaa;margin-top:6px;">※不適切なユーザー名は管理者が変更できます</div>
      </div>`).join('');
  }

  async function adminChangeUsername(userId) {
    const input = document.getElementById('new-uname-' + userId);
    const newName = input.value.trim();
    if (!newName) { alert('新しいユーザー名を入力してください'); return; }
    const { data: existing } = await client.from('profiles').select('id').eq('username', newName).neq('id', userId).single();
    if (existing) { alert('このユーザー名はすでに使われています'); return; }
    const { error } = await client.from('profiles').update({ username: newName }).eq('id', userId);
    if (error) { alert('変更に失敗しました'); return; }
    document.getElementById('uname-' + userId).textContent = newName;
    input.value = '';
    alert('ユーザー名を変更しました');
  }

  function renderList() {
    if (currentTab === 'users') { renderUserList(); return; }
    const filtered = allShops.filter(s => s.status === currentTab);
    const listEl = document.getElementById('shop-list');
    if (!filtered.length) { const labels = {pending:'審査待ちのお店はありません',approved:'承認済みのお店はありません',rejected:'却下したお店はありません'}; listEl.innerHTML = `<div class="empty">${labels[currentTab]}</div>`; return; }
    listEl.innerHTML = filtered.map(s => {
      const emoji = GENRE_EMOJI[s.genre] || '🍽️';
      const date = new Date(s.submitted_at).toLocaleDateString('ja-JP', {year:'numeric',month:'long',day:'numeric',hour:'2-digit',minute:'2-digit'});
      const vibes = (s.vibe || []).map(v => `<span class="tag tag-vibe">${v}</span>`).join('');
      const mapLink = s.map_url ? `<a class="shop-map" href="${s.map_url}" target="_blank">📍 Googleマップで確認</a>` : '';
      const imgEl = s.image_url ? `<img class="shop-card-img" src="${s.image_url}" alt="${s.name}" onerror="this.outerHTML='<div class=shop-card-img-placeholder>${emoji}</div>'">` : `<div class="shop-card-img-placeholder">${emoji}</div>`;
      const badgeClass = {pending:'badge-pending',approved:'badge-approved',rejected:'badge-rejected'}[s.status];
      const badgeLabel = {pending:'審査待ち',approved:'公開中',rejected:'却下'}[s.status];
      let actions = `<button class="btn btn-edit" onclick="openEdit('${s.id}')">✏️ 編集</button>`;
      if (s.status === 'pending') actions += `<button class="btn btn-approve" onclick="updateStatus('${s.id}','approved')">✓ 承認</button><button class="btn btn-reject" onclick="openRejectModal('${s.id}')">✕ 却下</button>`;
      else if (s.status === 'approved') actions += `<button class="btn btn-reject" onclick="openRejectModal('${s.id}')">✕ 非公開</button>`;
      else actions += `<button class="btn btn-restore" onclick="updateStatus('${s.id}','approved')">↩ 公開に戻す</button><button class="btn btn-restore" onclick="updateStatus('${s.id}','pending')">審査待ちに戻す</button>`;
      return `<div class="shop-card" id="card-${s.id}">${imgEl}<div class="shop-card-body"><div class="shop-card-top"><div><div class="shop-name">${s.name}</div><div class="shop-meta">${s.area} ・ 〜¥${s.price.toLocaleString()}</div></div><span class="badge ${badgeClass}">${badgeLabel}</span></div><div class="tags"><span class="tag tag-genre">${s.genre}</span>${vibes}</div><div class="shop-desc">${s.description || '（コメントなし）'}</div>${mapLink}<div class="shop-date">投稿日時：${date}</div><div class="actions">${actions}</div></div></div>`;
    }).join('');
  }

  async function updateStatus(id, status) {
    const { error } = await client.from('shops').update({ status }).eq('id', id);
    if (error) { alert('更新に失敗しました'); return; }
    const shop = allShops.find(s => s.id === id);
    if (shop) shop.status = status;
    updateStats(); renderList();
  }

  function openEdit(id) {
    const s = allShops.find(s => s.id === id);
    if (!s) return;
    const emoji = GENRE_EMOJI[s.genre] || '🍽️';
    document.getElementById('edit-id').value = s.id;
    document.getElementById('edit-current-image').value = s.image_url || '';
    document.getElementById('edit-name').value = s.name;
    document.getElementById('edit-genre').value = s.genre;
    document.getElementById('edit-area').value = s.area;
    document.getElementById('edit-price').value = s.price;
    document.getElementById('edit-desc').value = s.description || '';
    document.getElementById('edit-map').value = s.map_url || '';
    document.getElementById('edit-open').value = s.open_time || '';
    document.getElementById('edit-close').value = s.close_time || '';
    document.getElementById('edit-img-new-preview').style.display = 'none';
    document.getElementById('edit-image').value = '';
    document.getElementById('edit-menu-preview').style.display = 'none';
    document.getElementById('edit-menu-image').value = '';
    const menuCurrent = document.getElementById('edit-menu-current');
    menuCurrent.innerHTML = s.menu_image_url
      ? `<img src="${s.menu_image_url}" style="width:100%;max-height:140px;object-fit:cover;border-radius:8px;margin-bottom:6px;" alt="現在のメニュー">`
      : `<div style="font-size:13px;color:#aaa;padding:8px 0;">メニュー画像なし</div>`;
    const imgCurrent = document.getElementById('edit-img-current');
    imgCurrent.innerHTML = s.image_url
      ? `<img class="img-current" src="${s.image_url}" alt="${s.name}" onerror="this.outerHTML='<div class=img-current-placeholder>${emoji}</div>'">`
      : `<div class="img-current-placeholder">${emoji}</div>`;
    document.querySelectorAll('#modal-bg .vibe-label input').forEach(cb => { cb.checked = (s.vibe || []).includes(cb.value); });
    document.getElementById('save-msg').className = 'save-msg';
    document.getElementById('modal-bg').classList.add('open');
  }

  function clearImage() {
    document.getElementById('edit-current-image').value = '';
    document.getElementById('edit-img-current').innerHTML = '<div style="width:100%;height:60px;display:flex;align-items:center;justify-content:center;font-size:13px;color:#aaa;background:#f8f7f4;border-radius:10px;">デフォルト画像（ジャンルアイコン）に設定されます</div>';
    document.getElementById('edit-img-new-preview').style.display = 'none';
    document.getElementById('edit-image').value = '';
    document.getElementById('edit-menu-preview').style.display = 'none';
    document.getElementById('edit-menu-image').value = '';
    const menuCurrent = document.getElementById('edit-menu-current');
    menuCurrent.innerHTML = s.menu_image_url
      ? `<img src="${s.menu_image_url}" style="width:100%;max-height:140px;object-fit:cover;border-radius:8px;margin-bottom:6px;" alt="現在のメニュー">`
      : `<div style="font-size:13px;color:#aaa;padding:8px 0;">メニュー画像なし</div>`;
  }

  function previewEditImage(input) {
    const file = input.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
      const prev = document.getElementById('edit-img-new-preview');
      prev.src = e.target.result; prev.style.display = 'block';
    };
    reader.readAsDataURL(file);
  }

  function closeModal() { document.getElementById('modal-bg').classList.remove('open'); }

  async function saveEdit() {
    const id = document.getElementById('edit-id').value;
    const name = document.getElementById('edit-name').value.trim();
    const genre = document.getElementById('edit-genre').value;
    const area = document.getElementById('edit-area').value;
    const price = parseInt(document.getElementById('edit-price').value);
    const desc = document.getElementById('edit-desc').value.trim();
    const map = document.getElementById('edit-map').value.trim();
    const open_time = document.getElementById('edit-open').value || null;
    const close_time = document.getElementById('edit-close').value || null;
    const vibe = [...document.querySelectorAll('#modal-bg .vibe-label input:checked')].map(c => c.value);
    const imageFile = document.getElementById('edit-image').files[0];
    if (!name || !price) { showSaveMsg('店名と予算は必須です', 'error'); return; }

    const btn = document.getElementById('save-btn');
    btn.disabled = true; btn.textContent = '保存中...';

    let image_url = document.getElementById('edit-current-image').value || null;

    if (imageFile) {
      const ext = imageFile.name.split('.').pop();
      const fileName = `${Date.now()}.${ext}`;
      const { data: uploadData, error: uploadError } = await client.storage.from('shop-images').upload(fileName, imageFile, { cacheControl: '3600', upsert: false });
      if (!uploadError) {
        const { data: urlData } = client.storage.from('shop-images').getPublicUrl(fileName);
        image_url = urlData.publicUrl;
      }
    }

    let menu_image_url = document.getElementById('edit-menu-current').querySelector('img') ? document.getElementById('edit-menu-current').querySelector('img').src : null;
    const menuFile = document.getElementById('edit-menu-image').files[0];
    if (menuFile) {
      const menuExt = menuFile.name.split('.').pop();
      const menuFileName = `menu_${Date.now()}.${menuExt}`;
      const { data: menuUpload, error: menuError } = await client.storage.from('shop-images').upload(menuFileName, menuFile, { cacheControl: '3600', upsert: false });
      if (!menuError) {
        const { data: menuUrlData } = client.storage.from('shop-images').getPublicUrl(menuFileName);
        menu_image_url = menuUrlData.publicUrl;
      }
    }

    const { error } = await client.from('shops').update({ name, genre, area, price, vibe, description: desc, map_url: map, image_url, menu_image_url, open_time, close_time }).eq('id', id);
    btn.disabled = false; btn.textContent = '保存する';
    if (error) { showSaveMsg('保存に失敗しました', 'error'); return; }
    const shop = allShops.find(s => s.id === id);
    if (shop) Object.assign(shop, { name, genre, area, price, vibe, description: desc, map_url: map, image_url });
    showSaveMsg('保存しました！', 'success');
    setTimeout(() => { closeModal(); renderList(); }, 1000);
  }

  function clearImage() {
    if (!confirm('画像をデフォルト（ジャンルアイコン）に差し替えますか？')) return;
    document.getElementById('edit-current-image').value = '';
    document.getElementById('edit-image').value = '';
    document.getElementById('edit-img-new-preview').style.display = 'none';
    const shopId = document.getElementById('edit-id').value;
    const shop = allShops.find(s => s.id === shopId);
    const emoji = shop ? (({'ラーメン':'🍜','定食・ごはん':'🍱','カフェ':'☕','居酒屋・バー':'🍻','カレー':'🍛','寿司・和食':'🍣'})[shop.genre] || '🍽️') : '🍽️';
    document.getElementById('edit-img-current').innerHTML = '<div class="img-current-placeholder">' + emoji + '</div>';
  }

  function previewEditMenu(input) {
    const file = input.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
      const prev = document.getElementById('edit-menu-preview');
      prev.src = e.target.result; prev.style.display = 'block';
    };
    reader.readAsDataURL(file);
  }

  function clearMenuImage() {
    if (!confirm('メニュー画像を削除しますか？')) return;
    document.getElementById('edit-menu-image').value = '';
    document.getElementById('edit-menu-preview').style.display = 'none';
    document.getElementById('edit-menu-current').innerHTML = '<div style="font-size:13px;color:#aaa;padding:8px 0;">メニュー画像なし</div>';
  }

  function showSaveMsg(msg, type) { const el = document.getElementById('save-msg'); el.textContent = msg; el.className = 'save-msg ' + type; }

  function openRejectModal(id) {
    document.getElementById('reject-shop-id').value = id;
    document.getElementById('reject-reason').value = '';
    document.getElementById('reject-modal-bg').classList.add('open');
  }
  function closeRejectModal() {
    document.getElementById('reject-modal-bg').classList.remove('open');
  }
  async function confirmReject() {
    const id = document.getElementById('reject-shop-id').value;
    const reason = document.getElementById('reject-reason').value.trim();
    const { error } = await client.from('shops').update({ status: 'rejected', rejection_reason: reason || null }).eq('id', id);
    if (error) { alert('更新に失敗しました'); return; }
    const shop = allShops.find(s => s.id === id);
    if (shop) { shop.status = 'rejected'; shop.rejection_reason = reason; }
    closeRejectModal();
    updateStats();
    renderList();
  }
</script>

<!-- 却下理由モーダル -->
<div class="modal-bg" id="reject-modal-bg" onclick="if(event.target===this)closeRejectModal()">
  <div class="modal">
    <h2>却下の理由を入力</h2>
    <p style="font-size:13px;color:#888;margin-bottom:1rem;">ユーザーのマイページに表示されます。空欄でも却下できます。</p>
    <input type="hidden" id="reject-shop-id">
    <input type="hidden" id="reject-new-status">
    <div class="form-group">
      <label>理由（任意）</label>
      <textarea id="reject-reason" style="width:100%;height:80px;padding:10px 12px;font-size:14px;border:1px solid #ddd;border-radius:10px;font-family:inherit;resize:vertical;"></textarea>
    </div>
    <div style="display:flex;gap:8px;margin-top:12px;">
      <button onclick="closeRejectModal()" style="flex:1;padding:10px;font-size:13px;color:#888;background:#f0ede8;border:none;border-radius:10px;cursor:pointer;">キャンセル</button>
      <button onclick="confirmReject()" style="flex:1;padding:10px;font-size:13px;font-weight:700;background:#fdecea;color:#a0342e;border:1px solid #f5c6c2;border-radius:10px;cursor:pointer;">却下する</button>
    </div>
  </div>
</div>
</body>
