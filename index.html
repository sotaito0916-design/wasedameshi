<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ワセメシサーチ — 早稲田周辺グルメ検索</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif; background: #f8f7f4; color: #1a1a1a; min-height: 100vh; }
    header { background: #fff; border-bottom: 3px solid #8f0000; padding: 0.5rem 1rem; display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; gap: 4px; position: sticky; top: 0; z-index: 10; min-height: 56px; }
    .logo { font-size: 17px; font-weight: 700; color: #1a1a1a; text-decoration: none; letter-spacing: -0.5px; white-space: nowrap; }
    .logo span { color: #8f0000; }
    .header-right { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .header-link { font-size: 12px; color: #666; text-decoration: none; background: #f0ede8; padding: 5px 12px; border-radius: 999px; white-space: nowrap; }
    .header-link:hover { background: #e8e5e0; }
    .login-btn { font-size: 12px; color: #1a1a1a; background: none; border: 1px solid #ddd; padding: 5px 12px; border-radius: 999px; cursor: pointer; white-space: nowrap; }
    .user-info { font-size: 12px; color: #888; display: flex; align-items: center; gap: 8px; }
    .user-name { font-weight: 600; color: #1a1a1a; }
    .logout-link { font-size: 12px; color: #aaa; cursor: pointer; text-decoration: underline; }
    .filters-wrap { background: #fff8f8; border-bottom: 1px solid #d4a0a0; padding: 1rem 1.5rem; }
    .area-tabs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
    .area-tab { font-size: 12px; padding: 5px 14px; border-radius: 999px; border: 1px solid #ddd; background: transparent; cursor: pointer; color: #666; transition: all .15s; }
    .area-tab.active { background: #8f0000; color: #fff; border-color: #8f0000; }
    .filter-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
    .filter-row select { font-size: 13px; padding: 7px 12px; border: 1px solid #ddd; border-radius: 8px; background: #fff; color: #1a1a1a; cursor: pointer; }
    .budget-wrap { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .budget-wrap label { font-size: 12px; color: #666; white-space: nowrap; }
    .budget-wrap input[type=range] { width: 120px; cursor: pointer; }
    @media (max-width: 640px) {
      .filter-row { gap: 8px; }
      .budget-wrap { min-width: calc(50% - 8px); }
      .budget-wrap input[type=range] { width: 80px; }
    }
    .budget-label { font-size: 13px; font-weight: 600; min-width: 60px; }
    .filter-item { display: flex; align-items: center; gap: 6px; }
    .filter-item label { font-size: 12px; color: #666; white-space: nowrap; }
    .filter-item select { font-size: 13px; padding: 7px 10px; border: 1px solid #ddd; border-radius: 8px; background: #fff; color: #1a1a1a; cursor: pointer; }
    .results-sort-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 1rem; }
    .results-sort-row .results-count { margin-bottom: 0; }
    .results-sort-row .filter-item select { font-size: 13px; padding: 4px 10px; height: 28px; }
    .results-sort-row .filter-item label { font-size: 13px; color: #888; }
    main { max-width: 800px; margin: 0 auto; padding: 1.5rem 1rem; }
    .results-count { font-size: 13px; color: #888; margin-bottom: 1rem; }
    .results-count strong { color: #8f0000; }
    .ad-wrap { text-align: center; margin-bottom: 1.25rem; width: 100%; }
    .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 14px; }
    .card { background: #fff; border: 1px solid #e8e6e0; border-radius: 14px; overflow: hidden; cursor: pointer; transition: box-shadow .15s, transform .1s; }
    .card:hover { box-shadow: 0 2px 12px rgba(143,0,0,.12); transform: translateY(-1px); }
    .card-img { width: 100%; height: 160px; object-fit: cover; display: block; }
    .card-img-placeholder { width: 100%; height: 160px; display: flex; align-items: center; justify-content: center; font-size: 52px; background: #f8f7f4; }
    .card-body { padding: 1rem 1.1rem; }
    .card-top { display: flex; align-items: baseline; justify-content: space-between; gap: 8px; margin-bottom: 6px; }
    .card-name { font-size: 15px; font-weight: 600; }
    .card-price { font-size: 13px; color: #888; white-space: nowrap; }
    .tags { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 8px; }
    .tag { font-size: 11px; padding: 2px 9px; border-radius: 999px; font-weight: 500; }
    .tag-genre { background: #fdecea; color: #8f0000; border: 1px solid #d4a0a0; }
    .tag-vibe { background: #e4f5ee; color: #1a6e4a; }
    .card-desc { font-size: 13px; color: #666; line-height: 1.55; margin-bottom: 8px; }
    .card-footer { display: flex; align-items: center; justify-content: space-between; }
    .card-area { font-size: 11px; color: #aaa; }
    .like-btn { display: flex; align-items: center; gap: 4px; font-size: 13px; color: #aaa; background: none; border: 1px solid #e8e6e0; padding: 4px 10px; border-radius: 999px; cursor: pointer; transition: all .15s; }
    .card-hours { font-size: 12px; color: #888; margin-top: 4px; display: flex; align-items: center; gap: 4px; }
    .card-images { position: relative; overflow: hidden; }
    .card-img-count { position: absolute; bottom: 8px; right: 8px; background: rgba(0,0,0,.55); color: #fff; font-size: 11px; padding: 2px 8px; border-radius: 999px; }
    .card-actions { display: flex; gap: 6px; margin-top: 8px; }
    .edit-propose-btn { font-size: 11px; color: #8f0000; background: #f9f0f0; border: 1px solid #d4a0a0; padding: 4px 10px; border-radius: 999px; cursor: pointer; text-decoration: none; white-space: nowrap; }
    .img-gallery-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.9); z-index: 300; align-items: center; justify-content: center; flex-direction: column; gap: 12px; }
    .img-gallery-bg.open { display: flex; }
    .img-gallery-img { max-width: 90vw; max-height: 75vh; border-radius: 12px; object-fit: contain; }
    .img-gallery-nav { display: flex; gap: 12px; align-items: center; }
    .img-gallery-btn { background: rgba(255,255,255,.2); color: #fff; border: none; padding: 8px 18px; border-radius: 999px; cursor: pointer; font-size: 14px; }
    .img-gallery-close { position: absolute; top: 1rem; right: 1rem; background: rgba(255,255,255,.2); color: #fff; border: none; width: 36px; height: 36px; border-radius: 50%; cursor: pointer; font-size: 18px; }
    .img-gallery-counter { color: #fff; font-size: 13px; }
    .card-hours-none { font-size: 12px; color: #bbb; font-style: italic; margin-top: 4px; }
    .card-menu { margin-top: 10px; border-top: 1px solid #f0ede8; padding-top: 10px; }
    .card-menu-title { font-size: 11px; font-weight: 600; color: #888; margin-bottom: 6px; text-transform: uppercase; letter-spacing: .04em; }
    .card-menu-img { width: 100%; border-radius: 8px; object-fit: cover; max-height: 180px; display: block; cursor: zoom-in; transition: opacity .15s; }
    .card-menu-img:hover { opacity: .9; }
    .card-menu-none { font-size: 12px; color: #bbb; font-style: italic; }
    .menu-modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.85); z-index: 200; align-items: center; justify-content: center; padding: 1rem; cursor: zoom-out; }
    .menu-modal-bg.open { display: flex; }
    .menu-modal-img { max-width: 100%; max-height: 90vh; border-radius: 12px; object-fit: contain; }
    .like-btn.liked { color: #8f0000; border-color: #d4a0a0; background: #fff0f0; }
    .loading { text-align: center; padding: 4rem; color: #888; font-size: 14px; }
    .empty { text-align: center; padding: 4rem 2rem; color: #888; font-size: 14px; line-height: 1.8; }
    .error { text-align: center; padding: 2rem; color: #c0392b; font-size: 13px; background: #fdecea; border-radius: 10px; }



    /* モーダル共通 */
    .modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 100; align-items: center; justify-content: center; padding: 1rem; }
    .modal-bg.open { display: flex; }
    .modal { background: #fff; border-radius: 16px; padding: 2rem; width: 100%; max-width: 400px; max-height: 90vh; overflow-y: auto; }
    .modal h2 { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
    .modal p { font-size: 13px; color: #888; margin-bottom: 1.25rem; line-height: 1.6; }
    .modal label { font-size: 12px; font-weight: 600; color: #555; display: block; margin-bottom: 5px; text-transform: uppercase; letter-spacing: .05em; }
    .modal input { width: 100%; padding: 10px 12px; font-size: 14px; border: 1px solid #ddd; border-radius: 10px; margin-bottom: 12px; font-family: inherit; }
    .modal input:focus { outline: none; border-color: #1a1a1a; }
    .modal-btn { width: 100%; padding: 11px; font-size: 14px; font-weight: 700; border: none; border-radius: 10px; cursor: pointer; margin-bottom: 8px; }
    .modal-btn-primary { background: #1a1a1a; color: #fff; }
    .modal-btn-secondary { background: #f0ede8; color: #1a1a1a; }
    .modal-close { width: 100%; padding: 8px; font-size: 13px; color: #888; background: none; border: none; cursor: pointer; }
    .modal-msg { font-size: 13px; margin-bottom: 10px; padding: 8px 12px; border-radius: 8px; display: none; }
    .modal-msg.success { background: #e4f5ee; color: #1a6e4a; display: block; }
    .modal-msg.error { background: #fdecea; color: #a0342e; display: block; }
    .modal-tabs { display: flex; gap: 6px; margin-bottom: 1.25rem; }
    .modal-tab { flex: 1; padding: 8px; font-size: 13px; border-radius: 8px; border: 1px solid #ddd; background: transparent; cursor: pointer; color: #666; transition: all .15s; }
    .modal-tab.active { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    @media (max-width: 480px) {
      .cards { grid-template-columns: 1fr; }
      .filter-row { gap: 8px; }
      .budget-wrap input[type=range] { width: 80px; }
      .filter-item { min-width: calc(50% - 8px); }
      header { padding: 0.4rem 0.75rem; }
      .logo { font-size: 15px; }
      .header-link { font-size: 11px; padding: 4px 10px; }
      .login-btn { font-size: 11px; padding: 4px 10px; }
      .user-info { font-size: 11px; }
    }
  </style>
</head>
<body>
<header>
  <a class="logo" href="index.html">ワセ<span>メシ</span>サーチ</a>
  <div class="header-right">
    <div id="user-area"><button class="login-btn" onclick="openModal()">ログイン / 登録</button></div>
    <a class="header-link" href="mypage.html">マイページ</a>
    <a class="header-link" href="submit.html">＋ お店を登録</a>
  </div>
</header>

<div class="filters-wrap">
  <div class="area-tabs">
    <button class="area-tab active" data-area="">全エリア</button>
    <button class="area-tab" data-area="早稲田キャンパス周辺">早稲田キャンパス周辺</button>
    <button class="area-tab" data-area="高田馬場駅周辺">高田馬場駅周辺</button>
    <button class="area-tab" data-area="西早稲田周辺">西早稲田周辺</button>
  </div>
  <div class="filter-row">
    <select id="genre">
      <option value="">すべてのジャンル</option>
      <option>ラーメン</option>
      <option>油そば</option>
      <option>定食・ごはん</option>
      <option>カフェ</option>
      <option>居酒屋・バー</option>
      <option>カレー</option>
      <option>寿司・和食</option>
    </select>
    <select id="vibe">
      <option value="">すべての雰囲気</option>
      <option value="一人OK">一人でも入りやすい</option>
      <option value="グループ">グループ向け</option>
      <option value="デート">デートにおすすめ</option>
      <option value="勉強">勉強・作業できる</option>

    <div class="filter-item">
      <label>予算上限</label>
      <input type="range" id="budget" min="500" max="3000" step="100" value="3000">

    </div>
    <div class="filter-item">
      <label>営業時間</label>
      <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;">
        <select id="close-filter-select" onchange="onSelectChange(this)">
          <option value="">すべての時間帯</option>
          <option value="21:00">21時以降も営業</option>
          <option value="22:00">22時以降も営業</option>
          <option value="23:00">23時以降も営業</option>
          <option value="00:00">深夜0時以降も営業</option>
          <option value="01:00">深夜1時以降も営業</option>
          <option value="custom">手動入力</option>
        </select>
        <span id="close-filter-custom-wrap" style="display:none;align-items:center;gap:4px;">
          <input type="time" id="close-filter-custom" style="font-size:13px;padding:6px 8px;border:1px solid #ddd;border-radius:8px;width:110px;" oninput="renderCards()">
          <span style="font-size:13px;color:#666;white-space:nowrap;">以降も営業</span>
        </span>
      </div>
    </div>

  </div>
</div>

<main>
  <div class="ad-wrap"><!-- admax -->
<script src="https://adm.shinobi.jp/o/bfe25dcd3202de975bfdf4a708caa7d0"></script>
<!-- admax --></div>

  <div class="results-sort-row">
    <div class="results-count" id="results-count"></div>
    <div class="filter-item" style="flex-shrink:0;">
      <label>並び順</label>
      <select id="sort-order" onchange="renderCards()">
        <option value="random">ランダム</option>
        <option value="price_asc">価格が安い順</option>
        <option value="price_desc">価格が高い順</option>
        <option value="close_late">閉店時間が遅い順</option>
        <option value="close_early">閉店時間が早い順</option>
      </select>
    </div>
  </div>
  <div class="cards" id="cards"><div class="loading">読み込み中...</div></div>
</main>

<!-- ログイン・登録モーダル -->
<div class="modal-bg" id="modal-bg" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <h2 id="modal-title">ログイン / 新規登録</h2>
    <p>ユーザー名を設定してお店を投稿したり、いいねをつけられます。</p>
    <div class="modal-tabs">
      <button class="modal-tab active" onclick="switchModalTab('login')">ログイン</button>
      <button class="modal-tab" onclick="switchModalTab('signup')">新規登録</button>
    </div>
    <div class="modal-msg" id="modal-msg"></div>

    <div class="tab-content active" id="tab-login">
      <label>メールアドレス</label>
      <input type="email" id="login-email" placeholder="example@email.com">
      <label>パスワード</label>
      <input type="password" id="login-pw" placeholder="パスワード" onkeydown="if(event.key==='Enter')handleLogin()">
      <button class="modal-btn modal-btn-primary" onclick="handleLogin()">ログイン</button>
    </div>

    <div class="tab-content" id="tab-signup">
      <label>メールアドレス</label>
      <input type="email" id="signup-email" placeholder="example@email.com">
      <label>パスワード</label>
      <input type="password" id="signup-pw" placeholder="6文字以上">
      <button class="modal-btn modal-btn-primary" onclick="handleSignup()">新規登録</button>
    </div>
    <button class="modal-close" onclick="closeModal()">閉じる</button>
  </div>
</div>

<script>
  const SUPABASE_URL = 'https://wkiwwtkutsesbcmofqak.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndraXd3dGt1dHNlc2JjbW9mcWFrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4OTU1NTgsImV4cCI6MjA5MTQ3MTU1OH0.eHfa9Ul9WV_Zi3YOrEHncr2Yy_MybQF40e6Bj9l1oJQ';
  const GENRE_EMOJI = {'ラーメン':'🍜','定食・ごはん':'🍱','カフェ':'☕','居酒屋・バー':'🍻','カレー':'🍛','寿司・和食':'🍣'};
  const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  let allShops = [], myLikes = new Set(), currentArea = '', currentUser = null, currentProfile = null;

  async function initAuth() {
    const { data: { session } } = await client.auth.getSession();
    currentUser = session?.user || null;
    if (currentUser) {
      const { data } = await client.from('profiles').select('*').eq('id', currentUser.id).single();
      currentProfile = data;
    }
    updateUserArea();
    if (currentUser) await loadMyLikes();
  }

  function updateUserArea() {
    const el = document.getElementById('user-area');
    if (currentUser && currentProfile) {
      el.innerHTML = `<span class="user-info"><span class="user-name">${currentProfile.username}</span> <span class="logout-link" onclick="handleLogout()">ログアウト</span></span>`;
    } else if (currentUser) {
      el.innerHTML = `<span class="user-info"><span class="logout-link" onclick="handleLogout()">ログアウト</span></span>`;
    } else {
      el.innerHTML = `<button class="login-btn" onclick="openModal()">ログイン / 登録</button>`;
    }
  }

  function switchModalTab(tab) {
    document.querySelectorAll('.modal-tab').forEach((b,i) => b.classList.toggle('active', (i===0&&tab==='login')||(i===1&&tab==='signup')));
    document.getElementById('tab-login').classList.toggle('active', tab==='login');
    document.getElementById('tab-signup').classList.toggle('active', tab==='signup');
    document.getElementById('modal-msg').className = 'modal-msg';
  }

  async function handleLogin() {
    const email = document.getElementById('login-email').value.trim();
    const pw = document.getElementById('login-pw').value;
    if (!email || !pw) { showModalMsg('入力してください', 'error'); return; }
    const { data, error } = await client.auth.signInWithPassword({ email, password: pw });
    if (error) { showModalMsg('ログインに失敗しました', 'error'); return; }
    currentUser = data.user;
    const { data: profile } = await client.from('profiles').select('*').eq('id', currentUser.id).single();
    currentProfile = profile;
    await loadMyLikes();
    updateUserArea();
    closeModal();
    renderCards();
  }

  async function handleSignup() {
    const email = document.getElementById('signup-email').value.trim();
    const pw = document.getElementById('signup-pw').value;
    if (!email || !pw) { showModalMsg('メールとパスワードを入力してください', 'error'); return; }
    if (pw.length < 6) { showModalMsg('パスワードは6文字以上にしてください', 'error'); return; }
    const { data, error } = await client.auth.signUp({ email, password: pw });
    if (error) { showModalMsg('登録に失敗しました', 'error'); return; }
    if (data.user) {
      const { count: total } = await client.from('profiles').select('*', { count: 'exact', head: true });
      const username = 'ワセメシ' + ((total || 0) + 1);
      await client.from('profiles').insert({ id: data.user.id, username });
    }
    showModalMsg('確認メールを送信しました。メールのリンクをクリックしてください。', 'success');
  }

  async function handleLogout() {
    await client.auth.signOut();
    currentUser = null; currentProfile = null; myLikes = new Set();
    updateUserArea(); renderCards();
  }

  function openModal() { document.getElementById('modal-bg').classList.add('open'); }
  function closeModal() {
    document.getElementById('modal-bg').classList.remove('open');
    document.getElementById('modal-msg').className = 'modal-msg';
  }
  function showModalMsg(msg, type) { const el = document.getElementById('modal-msg'); el.textContent = msg; el.className = 'modal-msg ' + type; }

  async function loadMyLikes() {
    if (!currentUser) return;
    const { data } = await client.from('likes').select('shop_id').eq('user_id', currentUser.id);
    myLikes = new Set((data || []).map(l => l.shop_id));
  }

  async function toggleLike(e, shopId) {
    e.stopPropagation();
    if (!currentUser) { openModal(); return; }
    const shop = allShops.find(s => s.id === shopId);
    if (myLikes.has(shopId)) {
      await client.from('likes').delete().eq('shop_id', shopId).eq('user_id', currentUser.id);
      myLikes.delete(shopId);
      if (shop) shop.likeCount = Math.max(0, (shop.likeCount || 0) - 1);
    } else {
      await client.from('likes').insert({ shop_id: shopId, user_id: currentUser.id });
      myLikes.add(shopId);
      if (shop) shop.likeCount = (shop.likeCount || 0) + 1;
    }
    renderCards();
  }

  async function loadShops() {
    const [shopsRes, likesRes, imagesRes, menuImagesRes] = await Promise.all([
      client.from('shops').select('*').eq('status', 'approved').order('submitted_at', { ascending: false }),
      client.from('likes').select('shop_id'),
      client.from('shop_images').select('*').eq('is_hidden', false).order('uploaded_at', { ascending: true }),
      client.from('shop_menu_images').select('*').eq('is_hidden', false).order('uploaded_at', { ascending: true })
    ]);
    if (shopsRes.error) { document.getElementById('cards').innerHTML = '<div class="error">読み込みに失敗しました。</div>'; return; }
    const likeCounts = {};
    (likesRes.data || []).forEach(l => { likeCounts[l.shop_id] = (likeCounts[l.shop_id] || 0) + 1; });
    const imagesByShop = {};
    (imagesRes.data || []).forEach(img => {
      if (!imagesByShop[img.shop_id]) imagesByShop[img.shop_id] = [];
      imagesByShop[img.shop_id].push(img);
    });
    const menuImagesByShop = {};
    (menuImagesRes.data || []).forEach(img => {
      if (!menuImagesByShop[img.shop_id]) menuImagesByShop[img.shop_id] = [];
      menuImagesByShop[img.shop_id].push(img);
    });
    allShops = (shopsRes.data || []).map(s => ({ ...s, likeCount: likeCounts[s.id] || 0, shopImages: imagesByShop[s.id] || [], menuImages: menuImagesByShop[s.id] || [] }));
    renderCards();
  }

  async function loadRanking() {
    const { data, error } = await client.from('profiles').select('username, approved_count').order('approved_count', { ascending: false }).limit(5);
    const el = document.getElementById('ranking-list');
    if (error || !data || !data.length) { el.innerHTML = '<div style="font-size:13px;color:#aaa;">まだランキングデータがありません</div>'; return; }
    const medals = ['🥇','🥈','🥉'];
    el.innerHTML = data.map((p, i) => `
      <div class="ranking-item">
        <span class="rank-num rank-${i+1}">${medals[i] || (i+1)}</span>
        <span class="rank-name">${p.username}</span>
        <span class="rank-count">${p.approved_count}件承認</span>
      </div>`).join('');
  }

  function renderCards() {
    const genre = document.getElementById('genre').value;
    const vibe = document.getElementById('vibe').value;
    const budget = parseInt(document.getElementById('budget').value);
    const selectVal = document.getElementById('close-filter-select').value;
    const closeFilter = selectVal === 'custom'
      ? document.getElementById('close-filter-custom').value
      : selectVal;

    const toMin = t => {
      if (!t) return null;
      const [h, m] = t.split(':').map(Number);
      return h * 60 + m;
    };
    const isOpenUntil = (closeTime, filterTime) => {
      if (!closeTime) return true;
      const c = toMin(closeTime);
      const f = toMin(filterTime);
      const midnight = 24 * 60;
      // 閉店が深夜帯（0:00〜5:59）の場合は+24時間として扱う
      const cAdj = c < 360 ? c + midnight : c;
      // 検索時刻が深夜帯の場合も+24時間
      const fAdj = f < 360 ? f + midnight : f;
      return cAdj >= fAdj;
    };

    const filtered = allShops.filter(s => {
      if (currentArea && s.area !== currentArea) return false;
      if (genre && s.genre !== genre) return false;
      if (vibe && !(s.vibe || []).includes(vibe)) return false;
      if (s.price > budget) return false;
      if (closeFilter && !isOpenUntil(s.close_time, closeFilter)) return false;
      return true;
    });
    const sortOrder = document.getElementById('sort-order').value;

    // 閉店時間を分に変換（深夜帯は+24時間）
    const toMinAdj = t => {
      if (!t) return null;
      const [h, m] = t.split(':').map(Number);
      const mins = h * 60 + m;
      return mins < 360 ? mins + 1440 : mins; // 0:00〜5:59は翌日扱い
    };

    let sorted;
    if (sortOrder === 'random') {
      const shuffled = [...filtered].sort(() => Math.random() - 0.5);
      const withPhoto = shuffled.filter(s => {
        const primary = s.shopImages.find(i => i.is_primary) || s.shopImages[0];
        return primary?.image_url || s.image_url;
      });
      const withoutPhoto = shuffled.filter(s => {
        const primary = s.shopImages.find(i => i.is_primary) || s.shopImages[0];
        return !primary?.image_url && !s.image_url;
      });
      const top2 = withPhoto.slice(0, 2);
      const rest = [...withPhoto.slice(2), ...withoutPhoto].sort(() => Math.random() - 0.5);
      sorted = [...top2, ...rest];
    } else if (sortOrder === 'price_asc') {
      sorted = [...filtered].sort((a, b) => a.price - b.price);
    } else if (sortOrder === 'price_desc') {
      sorted = [...filtered].sort((a, b) => b.price - a.price);
    } else if (sortOrder === 'close_late') {
      sorted = [...filtered].sort((a, b) => {
        const am = toMinAdj(a.close_time);
        const bm = toMinAdj(b.close_time);
        if (am === null && bm === null) return 0;
        if (am === null) return 1;
        if (bm === null) return -1;
        return bm - am;
      });
    } else if (sortOrder === 'close_early') {
      sorted = [...filtered].sort((a, b) => {
        const am = toMinAdj(a.close_time);
        const bm = toMinAdj(b.close_time);
        if (am === null && bm === null) return 0;
        if (am === null) return 1;
        if (bm === null) return -1;
        return am - bm;
      });
    }

    document.getElementById('results-count').innerHTML = `<strong>${sorted.length}件</strong>のお店が見つかりました`;
    const cardsEl = document.getElementById('cards');
    if (!sorted.length) { cardsEl.innerHTML = '<div class="empty">条件に合うお店が見つかりませんでした。<br>絞り込みを変えてみてください。</div>'; return; }
    cardsEl.innerHTML = sorted.map(s => {
      const emoji = GENRE_EMOJI[s.genre] || '🍽️';
      const vibes = (s.vibe || []).map(v => `<span class="tag tag-vibe">${v}</span>`).join('');
      const liked = myLikes.has(s.id);
      const likeCount = s.likeCount || 0;
      // 画像の優先順位: shop_imagesのprimary → shop_imagesの最初 → image_url → placeholder
      const primaryImg = s.shopImages.find(i => i.is_primary) || s.shopImages[0];
      const primaryUrl = primaryImg?.image_url || s.image_url;
      const allImgUrls = s.shopImages.length > 0
        ? s.shopImages.map(i => i.image_url)
        : (s.image_url ? [s.image_url] : []);
      const imagesJson = encodeURIComponent(JSON.stringify(allImgUrls));
      const imgEl = primaryUrl
        ? `<div class="card-images" style="position:relative;"><img class="card-img" src="${primaryUrl}" alt="${s.name}" onerror="this.outerHTML='<div class=card-img-placeholder>${emoji}</div>'">` +
          (allImgUrls.length > 1 ? `<span class="img-gallery-count" style="position:absolute;bottom:8px;right:8px;background:rgba(0,0,0,.55);color:#fff;font-size:11px;padding:2px 8px;border-radius:999px;cursor:pointer;" onclick="event.stopPropagation();openGalleryFromEncoded(this);" data-images="${imagesJson}" data-idx="0">📷 ${allImgUrls.length}枚</span>` : '') +
          `</div>`
        : `<div class="card-img-placeholder">${emoji}</div>`;
      const mapAttr = s.map_url ? `onclick="openMap(event,'${s.map_url}')"` : '';
      const hoursHtml = (s.open_time && s.close_time)
        ? `<div class="card-hours" style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:4px;">
            <span>🕐 ${s.open_time} 〜 ${s.close_time}</span>
            <span style="font-size:10px;color:#bbb;">正確な時間はGoogleマップを参照</span>
           </div>`
        : `<div class="card-hours-none">営業時間情報なし</div>`;
      const primaryMenu = s.menuImages.find(i => i.is_primary) || s.menuImages[0];
      const menuUrl = primaryMenu?.image_url || s.menu_image_url;
      const allMenuUrls = s.menuImages.length > 0 ? s.menuImages.map(i => i.image_url) : (s.menu_image_url ? [s.menu_image_url] : []);
      const menuImagesJson = encodeURIComponent(JSON.stringify(allMenuUrls));
      const menuHtml = menuUrl
        ? `<div class="card-menu"><div class="card-menu-title" style="display:flex;align-items:center;justify-content:space-between;">📋 メニュー表${allMenuUrls.length > 1 ? `<span style="font-size:11px;color:#8f0000;cursor:pointer;" data-images="${menuImagesJson}" data-idx="0" onclick="event.stopPropagation();openGalleryFromEncoded(this);">${allMenuUrls.length}枚</span>` : ''}</div><img class="card-menu-img" src="${menuUrl}" alt="メニュー表" onclick="openMenuModal(event,'${menuUrl}')"></div>`
        : `<div class="card-menu"><div class="card-menu-title">📋 メニュー表</div><div class="card-menu-none">メニュー情報なし</div></div>`;
      return `<div class="card" ${mapAttr}>${imgEl}<div class="card-body"><div class="card-top"><span class="card-name">${s.name}</span><span class="card-price">〜¥${s.price.toLocaleString()}</span></div><div class="tags"><span class="tag tag-genre">${s.genre}</span>${vibes}</div><div class="card-desc">${s.description || ''}</div>${hoursHtml}${menuHtml}<div class="card-footer"><span class="card-area">📍 ${s.area}</span></div>
      <div class="card-actions">
        ${allImgUrls.length > 1 ? `<button class="edit-propose-btn" data-images="${imagesJson}" data-idx="0" onclick="event.stopPropagation();openGalleryFromEncoded(this);">📷 他の写真を見る</button>` : ''}
        <a class="edit-propose-btn" href="edit.html?id=${s.id}" onclick="event.stopPropagation()">✏️ 編集を提案する</a>
        <a class="edit-propose-btn" href="photo.html?id=${s.id}" onclick="event.stopPropagation()">📷 写真を投稿する</a>
        <button class="like-btn ${liked?'liked':''}" onclick="toggleLike(event,'${s.id}')" style="margin-left:auto;">${liked?'♥':'♡'} ${likeCount > 0 ? likeCount : 'いいね'}</button>
      </div>
      </div></div>`;
    }).join('');
  }

  function onSelectChange(sel) {
    const wrap = document.getElementById('close-filter-custom-wrap');
    const isCustom = sel.value === 'custom';
    wrap.style.display = isCustom ? 'flex' : 'none';
    if (!isCustom) renderCards();
  }

  function openMap(e, url) { e.preventDefault(); window.open(url, '_blank'); }
  let galleryImages = [], galleryIdx = 0;
  function openGalleryFromEncoded(el) {
    const images = JSON.parse(decodeURIComponent(el.dataset.images));
    const idx = parseInt(el.dataset.idx) || 0;
    galleryImages = images;
    galleryIdx = idx;
    updateGallery();
    document.getElementById('img-gallery-bg').classList.add('open');
  }
  function openGallery(e, images, idx) {
    e.stopPropagation();
    galleryImages = images;
    galleryIdx = idx;
    updateGallery();
    document.getElementById('img-gallery-bg').classList.add('open');
  }
  function updateGallery() {
    document.getElementById('gallery-img').src = galleryImages[galleryIdx];
    document.getElementById('gallery-counter').textContent = `${galleryIdx+1} / ${galleryImages.length}`;
  }
  function galleryPrev() { galleryIdx = (galleryIdx - 1 + galleryImages.length) % galleryImages.length; updateGallery(); }
  function galleryNext() { galleryIdx = (galleryIdx + 1) % galleryImages.length; updateGallery(); }
  function closeGallery() { document.getElementById('img-gallery-bg').classList.remove('open'); }

  function openMenuModal(e, url) { e.stopPropagation(); document.getElementById('menu-modal-img').src = url; document.getElementById('menu-modal-bg').classList.add('open'); }
  function closeMenuModal() { document.getElementById('menu-modal-bg').classList.remove('open'); }
  document.querySelectorAll('.area-tab').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.area-tab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active'); currentArea = btn.dataset.area; renderCards();
    });
  });
  document.getElementById('genre').addEventListener('change', renderCards);
  document.getElementById('close-filter-select').addEventListener('change', renderCards);
  document.getElementById('close-filter-custom').addEventListener('change', renderCards);
  document.getElementById('vibe').addEventListener('change', renderCards);
  document.getElementById('budget').addEventListener('input', e => {
    document.getElementById('budget-label').textContent = `〜¥${parseInt(e.target.value).toLocaleString()}`; renderCards();
  });

  initAuth().then(loadShops);
</script>
<div class="img-gallery-bg" id="img-gallery-bg" onclick="if(event.target===this)closeGallery()">
  <button class="img-gallery-close" onclick="closeGallery()">✕</button>
  <img class="img-gallery-img" id="gallery-img" alt="画像">
  <div class="img-gallery-nav">
    <button class="img-gallery-btn" onclick="galleryPrev()">←</button>
    <span class="img-gallery-counter" id="gallery-counter"></span>
    <button class="img-gallery-btn" onclick="galleryNext()">→</button>
  </div>
</div>
<div class="menu-modal-bg" id="menu-modal-bg" onclick="closeMenuModal()">
  <img class="menu-modal-img" id="menu-modal-img" alt="メニュー拡大">
</div>
</body>
</html>
